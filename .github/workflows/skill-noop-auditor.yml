name: Talocode Skills Quality

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  skills-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run auditor tests
        run: node scripts/test-skill-noop-auditor.mjs

      - name: Fail on high-severity no-ops
        run: node scripts/audit-skill-noops.mjs --fail-on-high

      - name: Validate Agent Distribution Pack
        run: node scripts/test-agent-distribution-pack.mjs
